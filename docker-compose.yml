services:
  midnight-proof-server:
    image: midnightntwrk/proof-server:8.0.3
    container_name: nextmed-proof-server
    ports:
      - "6300:6300"
    environment:
      - RUST_LOG=info
      - PROOF_SERVER_KEYS_DIR=/keys
    volumes:
      - ./managed:/keys:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6300/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
